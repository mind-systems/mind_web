server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets directly; fall back to the SPA shell for all other
    # paths so that client-side routes (/sessions, /calibration, etc.) resolve
    # correctly on direct navigation and page refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
